<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renungan Harian</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; }
        .container { background: #1e293b; padding: 30px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); max-width: 420px; width: 90%; text-align: center; border: 1px solid #334155; }
        .image-card { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 30px; overflow: hidden; margin-bottom: 25px; background: #111; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; }
        .ayat-isi { font-family: 'Playfair Display', serif; font-size: 1.3rem; line-height: 1.6; margin-bottom: 15px; font-style: italic; color: #f8fafc; }
        .ayat-ref { font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: #38bdf8; }
        button { 
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); 
            color: white; border: none; padding: 20px; border-radius: 50px; 
            font-family: 'Poppins'; cursor: pointer; font-weight: 600; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-size: 1.1rem; transition: all 0.3s ease;
        }
        button:active { transform: scale(0.95); }
        .loader { border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 80px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="loader"></div>
    <div id="main-content" style="display:none;">
        <div class="image-card">
            <img id="display-image" src="">
            <div class="overlay">
                <div class="ayat-isi" id="display-isi"></div>
                <div class="ayat-ref" id="display-label"></div>
            </div>
        </div>
        <button id="btn-audio" onclick="mulaiSuara()">
            <span id="btn-text">▶ Putar Renungan Hari Ini</span>
        </button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzgno-trMYg3bsZx8FW7wfMFZhsN3qrm9T1uG3OfLn4OdcrHEZSKjtNYrqCPZv-GXYW/exec"; 
    
    let teksRenungan = "";

    fetch(GAS_URL)
        .then(res => res.json())
        .then(data => {
            teksRenungan = data.teksNarasi;
            document.getElementById('display-image').src = data.imageUrl;
            document.getElementById('display-isi').innerText = `"${data.isiAyat}"`;
            document.getElementById('display-label').innerText = data.labelAyat;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        });

    function mulaiSuara() {
        const btnText = document.getElementById('btn-text');

        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            btnText.innerText = "▶ Putar Renungan";
            return;
        }

        if (teksRenungan) {
            const utterance = new SpeechSynthesisUtterance(teksRenungan);
            const voices = window.speechSynthesis.getVoices();

            // Mencari suara Pria Indonesia (mencoba mencari keyword 'male' atau 'pria')
            // Jika tidak ada, sistem akan mengambil default Indonesia tapi kita buat pitch-nya rendah
            const idMaleVoice = voices.find(v => v.lang.includes('id') && (v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('pria') || v.name.toLowerCase().includes('david')));
            
            if (idMaleVoice) {
                utterance.voice = idMaleVoice;
            }

            utterance.lang = 'id-ID';
            utterance.rate = 1.0;  // Kecepatan normal untuk ketegasan
            utterance.pitch = 0.8; // Menurunkan pitch membuat suara lebih berat/laki-laki

            utterance.onstart = () => {
                btnText.innerText = "⏹ Berhenti Mendengarkan";
            };

            utterance.onend = () => {
                btnText.innerText = "▶ Putar Ulang";
            };

            window.speechSynthesis.speak(utterance);
        }
    }

    // Load voices secara asinkron agar siap saat diklik
    window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
    };
</script>
</body>
</html>
