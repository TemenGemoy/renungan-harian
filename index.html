<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renungan Harian</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; overflow: hidden; }
        .container { background: #1e293b; padding: 30px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); max-width: 420px; width: 90%; text-align: center; border: 1px solid #334155; }
        .image-card { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 30px; overflow: hidden; margin-bottom: 25px; background: #111; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; }
        .ayat-isi { font-family: 'Playfair Display', serif; font-size: 1.3rem; line-height: 1.6; margin-bottom: 15px; font-style: italic; color: #f8fafc; }
        .ayat-ref { font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: #38bdf8; }
        
        button { 
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); 
            color: white; border: none; padding: 20px; border-radius: 50px; 
            font-family: 'Poppins'; cursor: pointer; font-weight: 600; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-size: 1.1rem; transition: all 0.3s ease;
        }
        button:active { transform: scale(0.96); opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; }
        
        .loader { border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 80px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Hilangkan semua label kredit */
        .credit { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="loader"></div>
    <div id="main-content" style="display:none;">
        <div class="image-card">
            <img id="display-image" src="">
            <div class="overlay">
                <div class="ayat-isi" id="display-isi"></div>
                <div class="ayat-ref" id="display-label"></div>
            </div>
        </div>
        <button id="btn-audio" onclick="playRenungan()">
            <span id="btn-text">▶ Putar Renungan Hari Ini</span>
        </button>
    </div>
</div>

<script>
    // URL Web App GAS kamu (Pastikan ujungnya /exec)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzgno-trMYg3bsZx8FW7wfMFZhsN3qrm9T1uG3OfLn4OdcrHEZSKjtNYrqCPZv-GXYW/exec"; 
    
    const ELEVEN_LABS_KEY = "sk_a069d64bc3f209adea015f59578366fc8d91ef3c0ce8cb18";
    const VOICE_ID = "EXAVITQu4vr4xnSDxMaL"; 

    let teksNarasi = "";

    // Load data secepat mungkin saat halaman dibuka
    fetch(GAS_URL)
        .then(res => res.json())
        .then(data => {
            teksNarasi = data.teksNarasi;
            document.getElementById('display-image').src = data.imageUrl;
            document.getElementById('display-isi').innerText = `"${data.isiAyat}"`;
            document.getElementById('display-label').innerText = data.labelAyat;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        });

    async function playRenungan() {
        const btn = document.getElementById('btn-audio');
        const btnText = document.getElementById('btn-text');
        
        btn.disabled = true;
        btnText.innerText = "⏳ Memulai Renungan...";

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'xi-api-key': ELEVEN_LABS_KEY
                },
                body: JSON.stringify({
                    text: teksNarasi,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { 
                        stability: 0.55, 
                        similarity_boost: 0.8,
                        style: 0.2, // Membuat suara lebih natural
                        use_speaker_boost: true
                    }
                })
            });

            if (!response.ok) throw new Error();

            const blob = await response.blob();
            const audioUrl = URL.createObjectURL(blob);
            const audio = new Audio(audioUrl);
            
            btnText.innerText = "🔊 Mendengarkan...";
            audio.play();
            
            audio.onended = () => {
                btnText.innerText = "▶ Putar Ulang";
                btn.disabled = false;
            };
        } catch (err) {
            alert("Koneksi tidak stabil atau kuota habis.");
            btn.disabled = false;
            btnText.innerText = "▶ Putar Renungan";
        }
    }
</script>
</body>
</html>
