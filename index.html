<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renungan Harian</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #020617; display: flex; flex-direction: column; min-height: 100vh; margin: 0; color: white; overflow-x: hidden; }
        
        /* Particle Background */
        .particle { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 50%; bottom: -10px; animation: float 15s linear infinite; z-index: 0; }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-110vh); } }

        .wrapper { display: flex; flex: 1; gap: 25px; width: 95%; max-width: 1400px; align-items: flex-start; justify-content: center; z-index: 10; padding: 40px 20px; margin: 0 auto; }

        /* Panel Glassmorphism */
        .side-panel { flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .glass-box { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(15px); padding: 30px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        /* Main Card */
        .main-card { width: 380px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); padding: 35px; border-radius: 45px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 50px 100px rgba(0,0,0,0.5); }
        .image-card { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 30px; overflow: hidden; margin-bottom: 25px; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; }
        .ayat-isi { font-family: 'Playfair Display', serif; font-size: 1.2rem; line-height: 1.6; font-style: italic; }

        h3 { font-size: 1.1rem; color: #38bdf8; margin: 0 0 15px 0; letter-spacing: 1px; }
        .search-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 15px; color: white; width: 100%; box-sizing: border-box; outline: none; font-family: 'Poppins'; }
        .result-box { margin-top: 15px; font-size: 0.9rem; color: #cbd5e1; line-height: 1.7; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; min-height: 100px; }
        
        .ai-explanation { margin-top: 15px; font-size: 0.85rem; color: #94a3b8; line-height: 1.7; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }

        button#btn-play { 
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); 
            color: white; border: none; padding: 20px; border-radius: 50px; 
            font-weight: 600; width: 100%; cursor: pointer; transition: 0.3s; 
            font-size: 1rem; box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }
        button#btn-play:active { transform: scale(0.98); }

        @media (max-width: 1024px) { .wrapper { flex-direction: column; align-items: center; } .side-panel { width: 100%; } }
    </style>
</head>
<body onclick="startBacksound()" onload="initApp()">

<div id="yt-player" style="position: absolute; left: -9999px;"></div>

<div class="wrapper">
    <div class="side-panel">
        <div class="glass-box">
            <h3>✨ Renungan Hari Ini :</h3>
            <div id="daily-verse" style="font-weight: 600; color: #f8fafc; font-size: 1.1rem; line-height: 1.5;">Memuat ayat...</div>
            <div id="daily-explanation" class="ai-explanation">Menganalisis pesan...</div>
        </div>
    </div>

    <div class="main-card">
        <div class="image-card">
            <img id="display-image" src="">
            <div class="overlay">
                <div id="display-isi" class="ayat-isi">Menyiapkan renungan...</div>
            </div>
        </div>
        <button onclick="toggleRenungan()" id="btn-play">▶ Putar Renungan Hari Ini</button>
        <p style="font-size: 0.75rem; color: #475569; margin-top: 15px;">*Ketuk di mana saja untuk musik latar</p>
    </div>

    <div class="side-panel">
        <div class="glass-box">
            <h3>🔍 Cari Kekuatan</h3>
            <input type="text" id="search-topic" class="search-box" placeholder="Ketik topik (ex: Sembuh, Semangat)..." onkeyup="if(event.keyCode===13) cariTopik()">
            <div id="res-topic" class="result-box">Cari ayat penguatan berdasarkan perasaanmu...</div>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzgno-trMYg3bsZx8FW7wfMFZhsF3qrm9T1uG3OfLn4OdcrHEZSKjtNYrqCPZv-GXYW/exec";
    let player, teksRenungan = "", backsoundStarted = false;

    // Data Harian
    const dailyData = [
        { verse: "Filipi 4:13", text: "Segala perkara dapat kutanggung di dalam Dia yang memberi kekuatan kepadaku.", exp: "Penjelasan : Kekuatanmu bukan dari usahamu sendiri, tapi dari Tuhan yang diam di dalammu. Hadapi tantangan hari ini dengan tenang." },
        { verse: "Yesaya 41:10", text: "Janganlah takut, sebab Aku menyertai engkau, janganlah bimbang, sebab Aku ini Allahmu.", exp: "Penjelasan : Ketakutan akan sirna saat kamu menyadari siapa yang berjalan di sampingmu. Tuhan memegang tangan kananmu." }
    ];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0', width: '0',
            videoId: 'P2vR9Xm9G78', // Lagu instrumental penyembahan
            playerVars: { 'loop': 1, 'playlist': 'P2vR9Xm9G78' },
            events: { 'onReady': onPlayerReady }
        });
    }

    function onPlayerReady() {
        player.setVolume(20); // Set volume musik latar agar tetap pelan
    }

    function startBacksound() {
        if (!backsoundStarted && player) {
            player.playVideo();
            backsoundStarted = true;
        }
    }

    function initApp() {
        // Tampilkan Data Harian
        const day = new Date().getDate() % dailyData.length;
        document.getElementById('daily-verse').innerText = dailyData[day].verse + ": \"" + dailyData[day].text + "\"";
        document.getElementById('daily-explanation').innerText = dailyData[day].exp;

        // Ambil Data Renungan dari Google Script
        fetch(GAS_URL).then(res => res.json()).then(data => {
            teksRenungan = data.teksNarasi;
            document.getElementById('display-image').src = data.imageUrl;
            document.getElementById('display-isi').innerText = `"${data.isiAyat}"`;
        });
    }

    function toggleRenungan() {
        const btn = document.getElementById('btn-play');
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            btn.innerText = "▶ Putar Renungan Hari Ini";
            if(player) player.playVideo(); // Musik nyala lagi kalau renungan berhenti
            return;
        }

        const utt = new SpeechSynthesisUtterance(teksRenungan);
        const voices = window.speechSynthesis.getVoices();
        
        // --- SUARA PEREMPUAN FAVORIT ---
        const femaleVoice = voices.find(v => v.lang.includes('id') && !v.name.toLowerCase().includes('male'));
        if(femaleVoice) utt.voice = femaleVoice;
        
        utt.pitch = 1.25; // Nada lembut dan jernih
        utt.rate = 0.95;  // Kecepatan bicara yang tenang
        
        utt.onstart = () => {
            btn.innerText = "⏹ Berhenti Mendengarkan";
            if(player) player.pauseVideo(); // Musik latar mati saat renungan bicara
        };

        utt.onend = () => {
            btn.innerText = "▶ Putar Ulang";
            if(player) player.playVideo(); // Musik latar otomatis nyala lagi setelah Amin
        };

        window.speechSynthesis.speak(utt);
    }

    function cariTopik() {
        const db = {
            "sembuh": "Mazmur 147:3 - 'Ia menyembuhkan orang-orang yang patah hati dan membalut luka-luka mereka.'",
            "semangat": "Roma 12:11 - 'Janganlah hendaknya kerajinanmu kendor, biarlah rohmu menyala-nyala dan layanilah Tuhan.'",
            "kecewa": "1 Petrus 5:7 - 'Serahkanlah segala kekhawatiranmu kepada-Nya, sebab Ia yang memelihara kamu.'"
        };
        const key = document.getElementById('search-topic').value.toLowerCase();
        document.getElementById('res-topic').innerText = db[key] || "Coba topik lain: Sembuh, Semangat, atau Kecewa.";
    }

    // Partikel hiasan
    for(let i=0; i<20; i++) {
        let p = document.createElement('div'); p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw'; p.style.animationDelay = Math.random() * 15 + 's';
        document.body.appendChild(p);
    }
</script>
</body>
</html>
