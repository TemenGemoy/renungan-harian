<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renungan Harian</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS LAMA KAMU --- */
        body { font-family: 'Poppins', sans-serif; background: #020617; display: flex; flex-direction: column; min-height: 100vh; margin: 0; color: white; overflow-x: hidden; }
        
        /* INI CSS BARU UNTUK HILANGIN SCROLLBAR */
        body::-webkit-scrollbar, .result-box::-webkit-scrollbar, .glass-box::-webkit-scrollbar { display: none; }
        body, .result-box, .glass-box { -ms-overflow-style: none; scrollbar-width: none; }

        .particle { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 50%; bottom: -10px; animation: float 15s linear infinite; z-index: 0; }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-110vh); } }
        .wrapper { display: flex; flex: 1; gap: 25px; width: 95%; max-width: 1400px; align-items: flex-start; justify-content: center; z-index: 10; padding: 40px 20px; margin: 0 auto; }
        .side-panel { flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .glass-box { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(15px); padding: 30px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow-y: auto; }
        .main-card { width: 380px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); padding: 35px; border-radius: 45px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 50px 100px rgba(0,0,0,0.5); }
        .image-card { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 30px; overflow: hidden; margin-bottom: 25px; background: #111; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); opacity: 0; transition: opacity 1s ease; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; }
        .ayat-isi { font-family: 'Playfair Display', serif; font-size: 1.2rem; line-height: 1.6; font-style: italic; }
        h3 { font-size: 1.1rem; color: #38bdf8; margin: 0 0 15px 0; letter-spacing: 1px; }
        .search-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 15px; color: white; width: 100%; box-sizing: border-box; outline: none; }
        .result-box { margin-top: 15px; font-size: 0.9rem; color: #cbd5e1; line-height: 1.7; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; min-height: 100px; overflow-y: auto; }
        .ai-explanation { margin-top: 15px; font-size: 0.85rem; color: #94a3b8; line-height: 1.7; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        button#btn-play { background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); color: white; border: none; padding: 20px; border-radius: 50px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.3s; font-size: 1rem; box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }
        @media (max-width: 1024px) { .wrapper { flex-direction: column; align-items: center; } .side-panel { width: 100%; } }
    </style>
</head>
<body onload="initApp()">

<div id="yt-player" style="position: absolute; left: -9999px;"></div>

<div class="wrapper">
    <div class="side-panel">
        <div class="glass-box">
            <h3>✨ Renungan Hari Ini :</h3>
            <div id="daily-verse" style="font-weight: 600; color: #f8fafc; font-size: 1.1rem; line-height: 1.5;">Memuat...</div>
            <div id="daily-explanation" class="ai-explanation">Menyiapkan pesan...</div>
        </div>
    </div>

    <div class="main-card">
        <div class="image-card">
            <img id="display-image" src="">
            <div class="overlay">
                <div id="display-isi" class="ayat-isi">Mempersiapkan Firman...</div>
            </div>
        </div>
        <button onclick="toggleRenungan()" id="btn-play">▶ Putar Renungan</button>
    </div>

    <div class="side-panel">
        <div class="glass-box">
            <h3>🔍 Cari Kekuatan</h3>
            <input type="text" id="search-topic" class="search-box" placeholder="Ketik topik (ex: Ujian, Marah, Sedih)..." onkeyup="if(event.keyCode===13) cariTopik()">
            <div id="res-topic" class="result-box">Ketik perasaanmu lalu tekan Enter.</div>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzgno-trMYg3bsZx8FW7wfMFZhsN3qrm9T1uG3OfLn4OdcrHEZSKjtNYrqCPZv-GXYW/exec";
    let player, teksRenungan = "", musicStarted = false, availableVoices = [];

    window.speechSynthesis.onvoiceschanged = () => { availableVoices = window.speechSynthesis.getVoices(); };

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0', width: '0',
            videoId: 'P2vR9Xm9G78', 
            playerVars: { 'loop': 1, 'playlist': 'P2vR9Xm9G78', 'autoplay': 0 },
            events: { 'onReady': () => player.setVolume(15) }
        });
    }

    function initApp() {
        const dailyData = [
            { verse: "Filipi 4:13", text: "Segala perkara dapat kutanggung di dalam Dia yang memberi kekuatan kepadaku.", exp: "Penjelasan : Kekuatanmu berasal dari Kristus yang tinggal di dalammu." },
            { verse: "Yesaya 41:10", text: "Janganlah takut, sebab Aku menyertai engkau, janganlah bimbang, sebab Aku ini Allahmu.", exp: "Penjelasan : Tuhan memegang tanganmu dalam setiap keadaan." }
        ];
        const day = new Date().getDate() % dailyData.length;
        document.getElementById('daily-verse').innerText = dailyData[day].verse + ": \"" + dailyData[day].text + "\"";
        document.getElementById('daily-explanation').innerText = dailyData[day].exp;

        fetch(GAS_URL).then(res => res.json()).then(data => {
            teksRenungan = data.teksNarasi;
            const img = document.getElementById('display-image');
            img.src = data.imageUrl;
            img.onload = () => img.style.opacity = "1";
            document.getElementById('display-isi').innerText = `"${data.isiAyat}"`;
        });
    }

    function toggleRenungan() {
        if (!musicStarted && player) { player.playVideo(); musicStarted = true; }
        const btn = document.getElementById('btn-play');
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            btn.innerText = "▶ Putar Renungan";
            if(player) player.playVideo();
            return;
        }
        if(!teksRenungan) return;
        const utt = new SpeechSynthesisUtterance(teksRenungan);
        if (availableVoices.length === 0) availableVoices = window.speechSynthesis.getVoices();
        const femaleVoice = availableVoices.find(v => v.lang.includes('id') && (v.name.toLowerCase().includes('perempuan') || v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('santi')) && !v.name.toLowerCase().includes('male'));
        if(femaleVoice) utt.voice = femaleVoice;
        utt.lang = 'id-ID'; utt.pitch = 1.3; utt.rate = 0.95;
        utt.onstart = () => { btn.innerText = "⏹ Berhenti"; if(player) player.pauseVideo(); };
        utt.onend = () => { btn.innerText = "▶ Putar Ulang"; if(player) player.playVideo(); };
        window.speechSynthesis.speak(utt);
    }

    function cariTopik() {
        const db = {
            "sembuh": "Mazmur 147:3 - 'Ia menyembuhkan orang-orang yang patah hati dan membalut luka-luka mereka.'",
            "sakit hati": "Mazmur 34:19 - 'TUHAN itu dekat kepada orang-orang yang patah hati, dan Ia menyelamatkan orang-orang yang remuk jiwanya.'",
            "selingkuh": "Ibrani 13:4 - 'Hendaklah kamu semua penuh hormat terhadap perkawinan... sebab orang-orang sundal dan pezinah akan dihakimi Allah.'",
            "sekolah": "Amsal 2:6 - 'Karena Tuhanlah yang memberikan hikmat, dari mulut-Nya datang pengetahuan dan kepandaian.'",
            "ujian": "Filipi 4:13 - 'Segala perkara dapat kutanggung di dalam Dia yang memberi kekuatan kepadaku.'",
            "masa depan": "Yeremia 29:11 - 'Sebab Aku ini tahu rancangan-rancangan apa yang ada pada-Ku mengenai kamu... memberikan kepadamu hari depan yang penuh harapan.'",
            "marah": "Efesus 4:26 - 'Apabila kamu menjadi marah, janganlah kamu berbuat dosa: janganlah matahari terbenam, sebelum padam amarahmu.'",
            "semangat": "Roma 12:11 - 'Janganlah hendaknya kerajinanmu kendor, biarlah rohmu menyala-nyala dan layanilah Tuhan.'",
            "takut": "Yesaya 41:10 - 'Janganlah takut, sebab Aku menyertai engkau, janganlah bimbang, sebab Aku ini Allahmu.'",
            "olahraga": "1 Timotius 4:8 - 'Latihan badani terbatas gunanya, tetapi ibadah itu berguna dalam segala hal.'",
            "lelah": "Matius 11:28 - 'Marilah kepada-Ku, semua yang letih lesu dan berbeban berat, Aku akan memberi kelegaan kepadamu.'"
        };
        const key = document.getElementById('search-topic').value.toLowerCase();
        document.getElementById('res-topic').innerText = db[key] || "Coba: ujian, sakit hati, selingkuh, atau masa depan.";
    }

    for(let i=0; i<15; i++) {
        let p = document.createElement('div'); p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw'; p.style.animationDelay = Math.random() * 15 + 's';
        document.body.appendChild(p);
    }
</script>
</body>
</html>
