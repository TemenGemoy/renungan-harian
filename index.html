<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renungan Harian & Musik Rohani</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #020617; display: flex; flex-direction: column; min-height: 100vh; margin: 0; color: white; overflow-x: hidden; }
        
        .particle { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 50%; bottom: -10px; animation: float 15s linear infinite; z-index: 0; }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-110vh); } }

        .wrapper { display: flex; flex: 1; gap: 20px; width: 95%; max-width: 1400px; align-items: flex-start; justify-content: center; z-index: 10; padding: 20px; margin: 0 auto; margin-bottom: 120px; }

        /* Panel Samping */
        .side-panel { flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .glass-box { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(15px); padding: 25px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); }

        /* Main Card */
        .main-card { width: 380px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); padding: 30px; border-radius: 45px; box-shadow: 0 50px 100px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .image-card { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 30px; overflow: hidden; margin-bottom: 20px; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; }
        .ayat-isi { font-family: 'Playfair Display', serif; font-size: 1.1rem; line-height: 1.5; font-style: italic; }

        /* Song List */
        .song-list { height: 400px; overflow-y: auto; margin-top: 10px; }
        .song-item { padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); margin-bottom: 8px; }
        .song-item:hover { background: rgba(255,255,255,0.1); }

        /* Spotify Player Bar */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 100px; background: #000; border-top: 1px solid #282828; display: flex; align-items: center; padding: 0 30px; z-index: 1000; justify-content: space-between; }
        .song-info { width: 30%; display: flex; align-items: center; gap: 15px; }
        .song-info img { width: 56px; height: 56px; border-radius: 4px; }
        
        .player-controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .progress-area { display: flex; align-items: center; gap: 10px; width: 100%; }
        input[type="range"] { flex: 1; accent-color: #1db954; cursor: pointer; }

        /* Search Ayat */
        .search-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 15px; color: white; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 15px; font-family: 'Poppins'; }
        .result-text { font-size: 0.85rem; color: #cbd5e1; line-height: 1.6; font-style: italic; }

        button#btn-renungan { background: #1db954; color: white; border: none; padding: 15px; border-radius: 30px; font-weight: 600; width: 100%; cursor: pointer; }
        #yt-player { position: absolute; left: -9999px; } /* Sembunyikan Video */
    </style>
</head>
<body onload="initApp()">

<div id="yt-player"></div>

<div class="wrapper">
    <div class="side-panel">
        <div class="glass-box">
            <h3 style="color:#1db954; margin-top:0">🎵 Musik Rohani</h3>
            <div class="song-list" id="song-list"></div>
        </div>
    </div>

    <div class="main-card">
        <div class="image-card">
            <img id="display-image" src="">
            <div class="overlay">
                <div class="ayat-isi" id="display-isi">Menyiapkan berkat...</div>
            </div>
        </div>
        <button onclick="toggleRenungan()" id="btn-renungan">▶ Putar Renungan Hari Ini</button>
    </div>

    <div class="side-panel">
        <div class="glass-box">
            <h3 style="color:#38bdf8; margin-top:0">🌟 Kata Motivasi</h3>
            <p style="font-size: 0.9rem; font-style: italic; color: #cbd5e1;">"Janganlah takut, sebab Aku menyertai engkau."</p>
        </div>
        <div class="glass-box">
            <h3 style="color:#818cf8; margin-top:0">🔍 Cari Ayat</h3>
            <input type="text" id="keyword" class="search-box" placeholder="Ketik: Semangat, Sembuh..." onkeyup="if(event.keyCode===13) cariAyat()">
            <div id="res-ayat" class="result-text">Hasil akan muncul di sini...</div>
        </div>
    </div>
</div>

<div class="player-bar">
    <div class="song-info">
        <img id="track-img" src="https://via.placeholder.com/60" alt="">
        <div>
            <div id="track-title" style="font-size:0.9rem; font-weight:600">Pilih Lagu</div>
            <div id="track-artist" style="font-size:0.75rem; color:#b3b3b3">Artis</div>
        </div>
    </div>

    <div class="player-controls">
        <div style="font-size: 1.5rem; cursor:pointer;" onclick="togglePlay()">
            <span id="play-btn">▶</span>
        </div>
        <div class="progress-area">
            <span id="curr-time">0:00</span>
            <input type="range" id="seek-bar" value="0" step="1" onchange="seekVideo(this.value)">
            <span id="total-time">0:00</span>
        </div>
    </div>
    
    <div style="width:30%"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzgno-trMYg3bsZx8FW7wfMFZhsN3qrm9T1uG3OfLn4OdcrHEZSKjtNYrqCPZv-GXYW/exec";
    let player, timer, teksRenungan = "";

    const songs = [
        { id: "P2vR9Xm9G78", title: "Waktu Tuhan", artist: "NDC Worship", img: "https://i.ytimg.com/vi/P2vR9Xm9G78/mqdefault.jpg" },
        { id: "M0X8568eZ1A", title: "Sampai Akhir Hidupku", artist: "JPCC Worship", img: "https://i.ytimg.com/vi/M0X8568eZ1A/mqdefault.jpg" },
        { id: "vD91iO0tD_c", title: "Kebaikan Tuhan", artist: "Bethel Music", img: "https://i.ytimg.com/vi/vD91iO0tD_c/mqdefault.jpg" },
        { id: "v6i02W_Yf1U", title: "Doa Mengubah Segalanya", artist: "Regina P.", img: "https://i.ytimg.com/vi/v6i02W_Yf1U/mqdefault.jpg" }
    ];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0', width: '0',
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    function initApp() {
        const list = document.getElementById('song-list');
        list.innerHTML = songs.map((s, i) => `
            <div class="song-item" onclick="playSong('${s.id}', ${i})">
                <img src="${s.img}" style="width:40px; border-radius:4px;">
                <div><div style="font-size:0.85rem">${s.title}</div><div style="font-size:0.7rem; color:#b3b3b3">${s.artist}</div></div>
            </div>
        `).join('');
        fetch(GAS_URL).then(res => res.json()).then(data => {
            teksRenungan = data.teksNarasi;
            document.getElementById('display-image').src = data.imageUrl;
            document.getElementById('display-isi').innerText = `"${data.isiAyat}"`;
        });
    }

    function playSong(id, idx) {
        player.loadVideoById(id);
        document.getElementById('track-title').innerText = songs[idx].title;
        document.getElementById('track-artist').innerText = songs[idx].artist;
        document.getElementById('track-img').src = songs[idx].img;
        document.getElementById('play-btn').innerText = "⏸";
    }

    function togglePlay() {
        if(player.getPlayerState() === 1) { player.pauseVideo(); document.getElementById('play-btn').innerText = "▶"; }
        else { player.playVideo(); document.getElementById('play-btn').innerText = "⏸"; }
    }

    function seekVideo(val) { player.seekTo(val); }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            const duration = player.getDuration();
            document.getElementById('seek-bar').max = duration;
            document.getElementById('total-time').innerText = formatTime(duration);
            timer = setInterval(updateProgress, 1000);
        } else { clearInterval(timer); }
    }

    function updateProgress() {
        const curr = player.getCurrentTime();
        document.getElementById('seek-bar').value = curr;
        document.getElementById('curr-time').innerText = formatTime(curr);
    }

    function formatTime(sec) {
        let m = Math.floor(sec / 60);
        let s = Math.floor(sec % 60);
        return m + ":" + (s < 10 ? "0" + s : s);
    }

    function toggleRenungan() {
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            player.playVideo(); 
            return;
        }
        const utt = new SpeechSynthesisUtterance(teksRenungan);
        utt.onstart = () => { player.pauseVideo(); document.getElementById('play-btn').innerText = "▶"; };
        utt.onend = () => { player.playVideo(); document.getElementById('play-btn').innerText = "⏸"; };
        window.speechSynthesis.speak(utt);
    }

    function cariAyat() {
        const db = {
            "semangat": "Roma 12:11 - 'Janganlah hendaknya kerajinanmu kendor, biarlah rohmu menyala-nyala dan layanilah Tuhan.'",
            "sembuh": "Yeremia 17:14 - 'Sembuhkanlah aku, ya TUHAN, maka aku akan sembuh; selamatkanlah aku, maka aku akan selamat.'",
            "sabar": "Roma 12:12 - 'Bersukacitalah dalam pengharapan, sabarlah dalam kesesakan, dan bertekunlah dalam doa!'"
        };
        const key = document.getElementById('keyword').value.toLowerCase();
        document.getElementById('res-ayat').innerText = db[key] || "Coba: Semangat, Sembuh, Sabar.";
    }

    for(let i=0; i<15; i++) {
        let p = document.createElement('div'); p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw'; p.style.animationDelay = Math.random() * 15 + 's';
        document.body.appendChild(p);
    }
</script>
</body>
</html>
