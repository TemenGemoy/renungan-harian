<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renungan Harian</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #020617; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; overflow-x: hidden; }
        .particle { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.2); border-radius: 50%; bottom: -10px; animation: float 15s linear infinite; }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-110vh); } }
        
        .wrapper { display: flex; gap: 20px; width: 95%; max-width: 1300px; align-items: stretch; justify-content: center; flex-wrap: wrap; z-index: 10; padding: 20px; }

        /* Panel Samping */
        .side-panel { flex: 1; min-width: 300px; background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(15px); padding: 25px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 15px; }
        
        .main-card { width: 400px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); padding: 35px; border-radius: 45px; box-shadow: 0 50px 100px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.1); text-align: center; }

        .image-card { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 30px; overflow: hidden; margin-bottom: 20px; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; }
        .ayat-isi { font-family: 'Playfair Display', serif; font-size: 1.2rem; line-height: 1.6; font-style: italic; }

        /* Input & Search Style */
        .search-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 12px 15px; border-radius: 15px; color: white; width: 80%; font-family: 'Poppins'; outline: none; }
        .search-btn { background: #38bdf8; border: none; padding: 12px; border-radius: 15px; color: white; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .search-btn:hover { background: #0ea5e9; }
        
        .result-box { margin-top: 15px; font-size: 0.85rem; color: #cbd5e1; line-height: 1.6; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; min-height: 100px; }
        
        h3 { font-size: 1.1rem; color: #38bdf8; margin: 0; display: flex; align-items: center; gap: 10px; }
        button#btn-play { background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); color: white; border: none; padding: 18px; border-radius: 50px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 10px; }

        @media (max-width: 1024px) { .side-panel { min-width: 100%; } }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>

<div class="wrapper">
    <div class="side-panel">
        <h3>📖 Telusuri Kitab</h3>
        <p style="font-size: 0.8rem; color: #94a3b8;">Ketik nama kitab (Contoh: Mazmur, Yohanes)</p>
        <div style="display:flex; gap:10px;">
            <input type="text" id="input-kitab" class="search-box" placeholder="Cari kitab...">
            <button class="search-btn" onclick="cariKitab()">🔍</button>
        </div>
        <div class="result-box" id="res-kitab">Hasil pencarian kitab akan muncul di sini...</div>
    </div>

    <div class="main-card">
        <div class="image-card">
            <img id="display-image" src="">
            <div class="overlay">
                <div class="ayat-isi" id="display-isi">Menyiapkan renungan...</div>
            </div>
        </div>
        <button onclick="mulaiRenungan()" id="btn-play">▶ Putar Renungan</button>
        <p id="sub" style="font-size: 0.75rem; color: #64748b; margin-top: 15px;">"Dengarkan suara Tuhan hari ini"</p>
    </div>

    <div class="side-panel">
        <h3>💡 Cari Motivasi</h3>
        <p style="font-size: 0.8rem; color: #94a3b8;">Ketik kata kunci (Contoh: Semangat, Sabar, Sembuh)</p>
        <div style="display:flex; gap:10px;">
            <input type="text" id="input-motivasi" class="search-box" placeholder="Ketik topik...">
            <button class="search-btn" onclick="cariMotivasi()">✨</button>
        </div>
        <div class="result-box" id="res-motivasi">Cari ayat penguatan di sini...</div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzgno-trMYg3bsZx8FW7wfMFZhsN3qrm9T1uG3OfLn4OdcrHEZSKjtNYrqCPZv-GXYW/exec"; 
    let teksRenungan = "";
    const music = document.getElementById('bg-music');
    music.volume = 0.2;

    // Database Sederhana untuk Pencarian
    const dbKitab = {
        "kejadian": "Kitab pertama: Menceritakan tentang penciptaan alam semesta dan asal mula manusia.",
        "mazmur": "Kumpulan puji-pujian dan doa yang sangat indah. Terdiri dari 150 pasal.",
        "yohanes": "Injil yang menekankan bahwa Yesus adalah Firman yang menjadi manusia.",
        "amsal": "Kitab hikmat untuk menuntun hidup yang bijaksana dan takut akan Tuhan."
    };

    const dbMotivasi = {
        "semangat": "'Janganlah hendaknya kerajinanmu kendor, biarlah rohmu menyala-nyala dan layanilah Tuhan.' (Roma 12:11)",
        "sembuh": "'Sembuhkanlah aku, ya TUHAN, maka aku akan sembuh; selamatkanlah aku, maka aku akan selamat.' (Yeremia 17:14)",
        "sabar": "'Bersukacitalah dalam pengharapan, sabarlah dalam kesesakan, dan bertekunlah dalam doa!' (Roma 12:12)",
        "takut": "'Janganlah takut, sebab Aku menyertai engkau, janganlah bimbang, sebab Aku ini Allahmu.' (Yesaya 41:10)"
    };

    // Fungsi Search
    function cariKitab() {
        const val = document.getElementById('input-kitab').value.toLowerCase();
        document.getElementById('res-kitab').innerText = dbKitab[val] || "Kitab tidak ditemukan. Coba ketik nama lengkapnya.";
    }

    function cariMotivasi() {
        const val = document.getElementById('input-motivasi').value.toLowerCase();
        document.getElementById('res-motivasi').innerText = dbMotivasi[val] || "Topik belum tersedia. Coba kata kunci lain seperti: Semangat, Sembuh, atau Sabar.";
    }

    // Partikel
    for(let i=0; i<25; i++) {
        let p = document.createElement('div'); p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw'; p.style.animationDelay = Math.random() * 15 + 's';
        document.body.appendChild(p);
    }

    // Load Renungan
    fetch(GAS_URL).then(res => res.json()).then(data => {
        teksRenungan = data.teksNarasi;
        document.getElementById('display-image').src = data.imageUrl;
        document.getElementById('display-isi').innerText = `"${data.isiAyat}"`;
    });

    function mulaiRenungan() {
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            music.pause();
            document.getElementById('btn-play').innerText = "▶ Putar Renungan";
            return;
        }
        const utt = new SpeechSynthesisUtterance(teksRenungan);
        const voices = window.speechSynthesis.getVoices();
        utt.voice = voices.find(v => v.lang.includes('id') && v.name.toLowerCase().includes('male')) || null;
        utt.pitch = 0.8; utt.rate = 0.9;
        
        utt.onstart = () => { music.play(); document.getElementById('btn-play').innerText = "⏹ Berhenti"; };
        utt.onend = () => { music.pause(); document.getElementById('btn-play').innerText = "▶ Putar Ulang"; };
        window.speechSynthesis.speak(utt);
    }
</script>
</body>
</html>
